AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GenAI AWS Multi-Agent ThreatPulse Serverless Backend Pipeline

Parameters:
  NotificationEmail:
    Type: String
    Description: Verified email address in Amazon SES to receive security alerts.
  RefreshRateInMinutes:
    Type: Number
    Default: 15
    Description: Automated interval rate for the intelligence scanning loop.

Resources:

  # ==========================================
  # 1. CORE API NETWORK INFRASTRUCTURE
  # ==========================================
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'*'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"

  # ==========================================
  # 2. SEAMLESS COMPUTE & INTEGRATION ROUTING
  # ==========================================
  OrchestratorLambda:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: function_orchestrator/
      Handler: app.lambda_handler
      Runtime: python3.11
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          ALERTS_TABLE: !Ref AlertsTable
          CONFIG_TABLE: !Ref ConfigTable
          SEMANTIC_CACHE_TABLE: !Ref SemanticCacheTable
          VECTOR_BUCKET: !Ref VectorStorageBucket
          NOTIFICATION_EMAIL: !Ref NotificationEmail
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AlertsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SemanticCacheTable
        - S3CrudPolicy:
            BucketName: !Ref VectorStorageBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - ses:SendEmail
                - ses:SendRawEmail
                - sagemaker:InvokeEndpoint
              Resource: "*"
      Events:
        # Catch-all routing parameters to eliminate the "API contains no methods" error
        ProxyApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /
            Method: ANY
        ProxyApiGreedy:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY

  # ==========================================
  # 3. STORAGE LAYER (DYNAMODB & S3 BUCKETS)
  # ==========================================
  AlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ThreatPulseAlerts
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ThreatPulseConfig
      AttributeDefinitions:
        - AttributeName: configKey
          AttributeType: S
      KeySchema:
        - AttributeName: configKey
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  SemanticCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ThreatPulseSemanticCache
      AttributeDefinitions:
        - AttributeName: cacheKey
          AttributeType: S
      KeySchema:
        - AttributeName: cacheKey
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  VectorStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ==========================================
  # 4. CHRONOS INTELLIGENCE SCHEDULING ENGINE
  # ==========================================
  ScheduledIntelligenceRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Automated trigger loop for multi-agent network analysis sweeps
      ScheduleExpression: !Sub "rate(${RefreshRateInMinutes} minutes)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt OrchestratorLambda.Arn
          Id: "TargetOrchestratorLambda"

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrchestratorLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduledIntelligenceRule.Arn

  # ==========================================
  # 5. SAGEMAKER SERVERLESS EMBEDDING CLUSTER
  # ==========================================
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess

  SageMakerModel:
    Type: AWS::SageMaker::Model
    Properties:
      ModelName: threatpulse-model
      ExecutionRoleArn: !GetAtt SageMakerExecutionRole.Arn
      PrimaryContainer:
        Image: !Sub "763104351884.dkr.ecr.${AWS::Region}.amazonaws.com/huggingface-pytorch-inference:2.0.0-transformers4.28.1-cpu-py310-ubuntu20.04"

  SageMakerEndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    DependsOn: SageMakerModel
    Properties:
      EndpointConfigName: threatpulse-config
      ProductionVariants:
        - ModelName: !GetAtt SageMakerModel.ModelName
          VariantName: AllTraffic
          InitialInstanceCount: 1
          InstanceType: ml.m5.large

  SageMakerServerlessEndpoint:
    Type: AWS::SageMaker::Endpoint
    DependsOn: SageMakerEndpointConfig
    Properties:
      EndpointConfigName: !GetAtt SageMakerEndpointConfig.EndpointConfigName

Outputs:
  ApiUrl:
    Description: "Production Live Gateway Connection string for Desktop App integration"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/"